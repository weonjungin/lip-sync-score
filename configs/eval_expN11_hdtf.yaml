seed: 42
device: cuda

train:
  out_dir: logs/expN11/1.5

model:
  name: syncnet_temporal
  emb_dim: 256
  in_frames: 11
  pooling: attn

  temporal:
    type: gru
    num_layers: 2
    bidirectional: true
    hidden_dim: 256


data:
  processed_root: /home/jiweon/projects/lip-sync-score/data/HDTF/processed_2500

  sampling:
    N: 11
    margin_trim: 0.15
    p_back: 0.65


eval:
  split: hdtf
  num_utts: 2000
  samples_per_utt: 5

  offset:
    min: -35
    max: 35
    step: 1