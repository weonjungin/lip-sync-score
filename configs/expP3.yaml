seed: 42
device: cuda

data:
  type: hdtf
  latent_root: /media/HDD/jiweon/latents/hdtf_s1
  data_root:   /media/HDD/jiweon/processed/HDTF/HDTF_processed
  train_split: /home/jiweon/projects/ADLip2/data/splits/train.txt
  val_split:   /home/jiweon/projects/ADLip2/data/splits/val.txt

  loader:
    num_workers: 4
    pin_memory: true
    drop_last: true

  sampling:
    N: 16
    min_gap: 5
    max_gap: 100
    samples_per_video: 200

model:
  name: syncnet_temporal
  in_frames: 16
  emb_dim: 256
  pooling: mean        # attn → mean
  lip_in_channels: 4
  temporal:
    type: tcn          # gru → tcn
    num_layers: 2
    kernel_size: 3
    dilation_base: 2
    # bidirectional, hidden_dim 제거

loss:
  name: contrastive
  margin: 1.0
  lambda_pos: 1.0
  lambda_neg: 1.0      # 1.8 → 1.0

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-4
  amp: true
  out_dir: logs/syncnet_hdtf_tcn  # 기존 결과와 구분
  log_every: 200
  save_every_epoch: true
  resume_ckpt: ""