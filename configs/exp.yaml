# /home/jiweon/projects/lip-sync-score/configs/exp.yaml

# ==============================
# Preprocessing config
# ==============================
prepare:
  mode: grid
  grid_root: /media/HDD/jiweon/GRID/raw
  out: /media/HDD/jiweon/GRID/processed_LSS

  roi_size: 96
  smooth_alpha: 0.4
  min_side_px: 20
  min_lip_frames: 5

  sr: 16000
  n_fft_audio: 512
  hop_length_audio: 160
  win_length_audio: 400
  n_mels: 80
  n_mfcc: 13


# ==============================
# Global
# ==============================
seed: 42
device: cuda   # cuda | cpu | auto


# ==============================
# Data / Dataset
# ==============================
data:
  processed_root: /home/jiweon/projects/lip-sync-score/data/GRID/processed_LSS

  loader:
    num_workers: 2
    prefetch_factor: 2
    pin_memory: true

  sampling:
    N: 5
    margin_trim: 0.15
    p_back: 0.65
    max_shift_sec: 2.0
    min_sep_frames: 5


# ==============================
# Split
# ==============================
split:
  type: speaker_disjoint
  train_ratio: 0.85
  val_ratio: 0.10


# ==============================
# Model / Loss
# ==============================
model:
  name: syncnet_like   # syncnet_like | syncnet_temporal

  emb_dim: 256
  in_frames: 5

loss:
  margin: 1.0


# ==============================
# Train
# ==============================
train:
  epochs: 20
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 0.0
  amp: true

  out_dir: logs/train_syncnetlike_grid
  log_every: 200
  save_every_epoch: true
  resume_ckpt: ""


# ==============================
# Eval (Offset Curve)
# ==============================
eval:
  split: test
  num_utts: 2000
  samples_per_utt: 5

  offset:
    min: -35
    max: 35
    step: 1

  save_plots: false
  plot_limit: 30
