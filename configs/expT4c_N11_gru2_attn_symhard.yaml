# configs/expT4c_N11_gru2_attn_symhard.yaml

seed: 42
device: cuda

data:
  processed_root: /home/jiweon/projects/lip-sync-score/data/GRID/processed_LSS

  loader:
    num_workers: 2
    pin_memory: true
    drop_last: true

  sampling:
    N: 11
    margin_trim: 0.15
    p_back: 0.65

    # neg 생성 범위 (전체 후보 window)
    max_shift_sec: 2.0

    # neg는 최소 이 프레임 이상 떨어져야 함
    min_sep_frames: 11

    # T4c: symmetric hard negatives in [N, 3N]
    # off_frames ∈ [-33..-11] ∪ [11..33] 를 hard로 취급
    neg_sampling:
      hard_prob: 0.5        # hard neg를 뽑을 확률 (T4bA와 동일하게 시작)
      hard_range: [11, 33]  # abs(off) in [11,33] 가 hard 후보
      avoid_zero: true

split:
  type: speaker_disjoint
  train_ratio: 0.85
  val_ratio: 0.10

model:
  name: syncnet_temporal
  emb_dim: 256
  in_frames: 11

  # 너가 쓰는 GRU2 + (attn) 설정을 그대로 유지한다고 가정
  # temporal_cfg는 네 SyncNetTemporal이 해석하는 방식에 맞춰야 함
  temporal:
    type: gru
    num_layers: 2
    bidirectional: true
    dropout: 0.1   # T4a 안정화 유지(원하면 0.0으로도 가능)

  # (만약 expT2/T3에서 attn 관련 키를 model 아래에 넣었다면 그대로 붙여줘)
  # 예: attention: { ... } 또는 crossattn: { ... }
  # 여기서는 네 기존 expT3/T4a yaml 구조를 몰라서 비워둠.

loss:
  margin: 1.0

train:
  epochs: 20
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 1.0e-4
  amp: true

  out_dir: logs/expT4c_N11_gru2_attn_symhard
  log_every: 200
  save_every_epoch: true
  resume_ckpt: ""

eval:
  split: test
  num_utts: 2000
  samples_per_utt: 5

  offset:
    min: -35
    max: 35
    step: 1

  save_plots: false
  plot_limit: 30
