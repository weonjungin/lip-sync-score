# config_progressive_last.yaml
# fusion_mode: last → F_face_out만 사용 (lip 정보가 cross-attn으로 이미 전파됨)

seed: 42
device: auto

data:
  type: hdtf_progressive
  latent_root: /media/HDD/jiweon/latents/hdtf_merged
  
  data_root: /home/ihjung/HDTF_ssd/processed
  train_split: /home/jiweon/projects/ADLip2/data/splits/train.txt
  val_split:   /home/jiweon/projects/ADLip2/data/splits/val.txt
  sampling:
    N: 16
    min_gap: 5
    max_gap: 100
    samples_per_video: 200
  loader:
    num_workers: 2
    pin_memory: true
    drop_last: true

model:
  name: syncnet_progressive
  in_frames: 16
  emb_dim: 256
  token_dim: 256
  n_heads: 4
  dropout: 0.1
  fusion_mode: last          # F_face_out만 pool → proj
  pooling: mean
  lip_in_channels: 4
  temporal:
    type: tcn
    num_layers: 2
    kernel_size: 3
    dilation_base: 2

loss:
  name: infonce
  temperature: 0.07

train:
  batch_size: 64
  lr: 1e-4
  weight_decay: 1e-4
  epochs: 30
  amp: true
  log_every: 200
  save_every_epoch: true
  resume_ckpt: ""
  out_dir: logs/progressive_last